const SHOWS = {
“apr30-17”:“30 Abr · 17:00”,
“apr30-18”:“30 Abr · 18:45”,
“may02-17”:“2 May · 17:00”,
“may02-18”:“2 May · 18:45”,

“vip” :{ label:“VIP”,        price:450, color:”#FFE600” },

“seg” :{ label:“2do Piso”,   price:250, color:”#00F5FF” },
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

let orders=[], inventory={}, filter={show:“all”,zone:“all”,status:“all”,search:””}, loading=true, errMsg=””;

// ── CARGA ──
// boletos.html usa: setDoc(doc(db, “kpop_show”, “orders”, orderId))
// Firestore path de 4 segmentos: colección/doc/subcolección/doc
// = colección “kpop_show” > doc “orders” > subcolección implícita NO
// En realidad Firestore trata el path como: col > doc > col > doc
// “kpop_show”(col) / “orders”(doc) / orderId(col???)
// Con 3 args después de db en doc(): es col/doc/col — inválido, debe ser par
// El SDK lo resuelve: si hay 4 segmentos totales en el path string = col/doc/subcol/doc ✓
// Entonces: col=“kpop_show”, doc=“orders” es el documento PADRE, orderId es documento en subcolección
// La subcolección no tiene nombre explícito — Firestore la infiere del path
// Para leer: getDocs(collection(db, “kpop_show”, “orders”)) — esto sería subcolección “orders” de doc “kpop_show”
// PERO “kpop_show” es una colección, no un doc.
// CONCLUSIÓN FINAL: doc(db,“kpop_show”,“orders”,orderId) en JS SDK v9
// equivale a path: “kpop_show/orders/orderId” — 3 segmentos = DOCUMENTO en subcolección
// Firestore: “kpop_show” es colección raíz, “orders” es documento, y orderId es subcolección de “orders”
// NO — con 3 segmentos es: col(kpop_show)/doc(orders)/col(orderId) — sería una colección
// Con la llamada doc(db, “kpop_show”, “orders”, orderId) el SDK genera path: kpop_show/orders/orderId
// Eso es 3 segmentos = colección si impar, documento si par. 3 = impar = COLECCIÓN. Error.
// En realidad doc() acepta (db, …pathSegments) donde pathSegments se unen con /
// doc(db,“kpop_show”,“orders”,orderId) → path=“kpop_show/orders/”+orderId = 3 segmentos separados por /
// Un path de documento debe tener número PAR de segmentos.
// 3 segmentos = impar = esto sería una colección, no un documento. El SDK lo rechazaría.
// PERO el código funciona y guarda datos… entonces quizás el SDK concatena diferente.
// Revisando documentación v9: doc(firestore, path) o doc(firestore, …pathSegments)
// doc(db,“kpop_show”,“orders”,orderId) → [“kpop_show”,“orders”,orderId].join(”/”) = “kpop_show/orders/KP-XXX”
// “kpop_show/orders/KP-XXX” = 3 segmentos separados por / → par de segmentos: kpop_show(col), orders(doc), KP-XXX(col)
// Espera — contando: kpop_show=1, orders=2, KP-XXX=3. Segmentos impares = colección. SDK lanzaría error.
// A menos que el SDK v9 acepte paths impares para doc() silenciosamente.
// Lo más probable: las órdenes están en la SUBCOLECCIÓN “orders” del documento “kpop_show/inventory” NO
// O bien: colección raíz “kpop_show”, documento con id=orderId, campo show/zone/etc.
// Y “orders” es solo un string extra que se ignora o concatena al id.
// ESTRATEGIA: intentar múltiples rutas y ver cuál devuelve datos.

async function loadData() {
loading=true; errMsg=””; render();
try {
// Intento 1: subcolección “orders” dentro del documento “kpop_show”
// Path: collection(db, “kpop_show”, “orders”) — esto sería col raíz kpop_show NO
// collection(db, “kpop_show”, “orders”) con 2 args después de db = path “kpop_show/orders”
// 2 segmentos = PAR = esto es un documento, no colección. SDK error.
// collection() necesita path impar. collection(db,“kpop_show”) = col raíz ✓
// collection(db,“kpop_show”,“orders”,“items”) = kpop_show(col)/orders(doc)/items(col) ✓

```
// El código original: setDoc(doc(db,"kpop_show","orders",orderId))
// doc() necesita path par: kpop_show(col)/orders(doc) = 2 seg ✓ con solo 2 args
// Con 3 args: kpop_show(col)/orders(doc)/orderId(col?) — impar, inválido para doc()
// PERO si el SDK concatena los args como pathSegments y divide por /...
// Quizás "kpop_show/orders" es el documento y orderId es la subcolección... todavía impar.

// La ÚNICA interpretación válida con path par:
// doc(db, "kpop_show", "orders/"+orderId) → path "kpop_show/orders/KP-XXX" — sigue siendo 3 segs
// O: el documento está en: colección "kpop_show", id="orders/KP-XXX" (con slash en el id) — inválido en Firestore

// CONCLUSIÓN PRAGMÁTICA: asumir que las órdenes están en colección "kpop_show" 
// con documentos cuyo id empieza con "KP-" (el código puede haber simplificado el path)
// O bien están en subcolección: collection path = "kpop_show/orders" si se accede como subcol de doc "orders"

// Intentar la subcolección correcta: si "orders" es un documento en "kpop_show",
// los KP-XXX serían subcolección de ese documento
// Para leer esa subcolección: collection(db, "kpop_show", "orders", <subcol_name>)
// Pero no sabemos el nombre de la subcol... 

// PLAN FINAL: leer colección raíz "kpop_show" y filtrar docs que no sean "inventory"
const col1 = await getDocs(collection(db, "kpop_show"));
const posibles = col1.docs.filter(d => d.id !== "inventory");

if (posibles.length > 0 && posibles[0].data().show) {
  // Las órdenes están directamente en kpop_show como documentos
  orders = posibles.map(d => ({ id: d.id, ...d.data() }));
} else {
  // Intentar subcolección "orders" del documento "orders" en kpop_show
  // Esto requiere conocer el path exacto
  // Asumimos que "orders" es un doc en kpop_show y los KP-XXX son su subcolección
  // No hay API directa para esto sin collectionGroup — usar collectionGroup
  // Sin imports adicionales, intentamos path directo
  const col2 = await getDocs(collection(db, "kpop_show", "orders", "items"));
  if (col2.docs.length > 0) {
    orders = col2.docs.map(d => ({ id: d.id, ...d.data() }));
  }
}

// Inventario
const invSnap = await getDoc(doc(db, "kpop_show", "inventory"));
if (invSnap.exists()) inventory = invSnap.data();
```

} catch(e) {
console.error(e);
errMsg = e.message;
}
loading=false; render();
}

function filtered() {
return orders.filter(o => {
if (filter.show   !== “all” && o.show   !== filter.show)   return false;
if (filter.zone   !== “all” && o.zone   !== filter.zone)   return false;
if (filter.status !== “all” && o.status !== filter.status) return false;
if (filter.search) {
const q=filter.search.toLowerCase();
if (!(o.buyer?.name||””).toLowerCase().includes(q) &&
!(o.buyer?.email||””).toLowerCase().includes(q) &&
!(o.id||””).toLowerCase().includes(q)) return false;
}
return true;
});
}

function metrics() {
const paid=orders.filter(o=>o.status===“paid”||o.status===“approved”);
const pending=orders.filter(o=>o.status===“pending”);
const byShow={}, byZone={};
Object.keys(SHOWS).forEach(k=>{byShow[k]={b:0,i:0};});
Object.keys(ZONES).forEach(k=>{byZone[k]={b:0,i:0};});
paid.forEach(o=>{
if(byShow[o.show]){byShow[o.show].b+=(o.qty||0);byShow[o.show].i+=(o.total||0);}
if(byZone[o.zone]){byZone[o.zone].b+=(o.qty||0);byZone[o.zone].i+=(o.total||0);}
});
return {
paid:paid.length, pending:pending.length, total:orders.length,
ingresos:paid.reduce((s,o)=>s+(o.total||0),0),
boletos:paid.reduce((s,o)=>s+(o.qty||0),0),
byShow, byZone
};
}

function exportCSV() {
const rows=filtered();
const h=[“ID”,“Nombre”,“Email”,“Teléfono”,“Función”,“Zona”,“Boletos”,“Total”,“Estado”,“Descuento”,“Código”];
const lines=rows.map(o=>{
const b=o.buyer||{};
return [o.id,b.name||””,b.email||””,b.phone||””,
SHOWS[o.show]||o.show||””,ZONES[o.zone]?.label||o.zone||””,
o.qty||1,o.total||0,o.status||””,
o.discount?`${o.discount.pct}%`:””,o.discount?.code||””,
].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(”,”);
});
const csv=[h.join(”,”),…lines].join(”\n”);
const blob=new Blob([”\uFEFF”+csv],{type:“text/csv;charset=utf-8;”});
const url=URL.createObjectURL(blob);
const a=document.createElement(“a”);
a.href=url;a.download=`kpop-ordenes-${Date.now()}.csv`;a.click();URL.revokeObjectURL(url);
}

function render() {
document.getElementById(“root”).innerHTML = loading ? `<div class="loading"><div class="spinner"></div><div class="loading-txt">CONECTANDO CON FIREBASE...</div></div>` : renderDash();
if (!loading) bindEvents();
}

function renderDash() {
const m=metrics(), rows=filtered();
return ` ${errMsg?`<div class="err-box">⚠️ Error Firebase: ${errMsg}</div>`:””}

  <div class="metrics-grid">
    <div class="mc accent"><div class="ml">Ingresos confirmados</div><div class="mv">$${m.ingresos.toLocaleString()}</div><div class="mn">MXN · pagadas</div></div>
    <div class="mc"><div class="ml">Boletos vendidos</div><div class="mv">${m.boletos}</div><div class="mn">${m.paid} órdenes</div></div>
    <div class="mc warn"><div class="ml">Pendientes</div><div class="mv">${m.pending}</div><div class="mn">sin completar pago</div></div>
    <div class="mc"><div class="ml">Total órdenes</div><div class="mv">${m.total}</div><div class="mn">todas las funciones</div></div>
  </div>

  <div class="row-grids">
    <div>
      <div class="st">Por función</div>
      <div class="bg4">
        ${Object.entries(SHOWS).map(([id,lb])=>{
          const d=m.byShow[id]||{b:0,i:0},so=id.startsWith("apr30");
          return`<div class="bc ${so?"so":""}"><div class="bl">${lb}${so?' <span class="bso">SOLD OUT</span>':""}</div><div class="bv">${d.b}<span> bol.</span></div><div class="bi">$${d.i.toLocaleString()}</div></div>`;
        }).join("")}
      </div>
    </div>
    <div>
      <div class="st">Por zona</div>
      <div class="bg3">
        ${Object.entries(ZONES).map(([id,z])=>{
          const d=m.byZone[id]||{b:0,i:0};
          return`<div class="bc" style="border-color:${z.color}33"><div class="bl" style="color:${z.color}">${z.label}</div><div class="bv">${d.b}<span> bol.</span></div><div class="bi">$${d.i.toLocaleString()}</div></div>`;
        }).join("")}
      </div>
    </div>
  </div>

  <div class="filters">
    <input class="fs" id="f-search" placeholder="🔍 Nombre, email o ID..." value="${filter.search}">
    <select class="fsel" id="f-show">
      <option value="all">Todas las funciones</option>
      ${Object.entries(SHOWS).map(([id,l])=>`<option value="${id}"${filter.show===id?" selected":""}>${l}</option>`).join("")}
    </select>
    <select class="fsel" id="f-zone">
      <option value="all">Todas las zonas</option>
      ${Object.entries(ZONES).map(([id,z])=>`<option value="${id}"${filter.zone===id?" selected":""}>${z.label}</option>`).join("")}
    </select>
    <select class="fsel" id="f-status">
      <option value="all">Todos</option>
      <option value="paid"${filter.status==="paid"?" selected":""}>✓ Pagado</option>
      <option value="pending"${filter.status==="pending"?" selected":""}>⏳ Pendiente</option>
    </select>
    <button class="btn-exp" onclick="window._export()">⬇ CSV</button>
    <button class="btn-ref" onclick="window._reload()">↺</button>
  </div>

  <div class="tscroll">
    <div class="twrap">
      <div class="thead"><div>ID</div><div>Comprador</div><div>Función</div><div>Zona</div><div>Bol.</div><div>Total</div><div>Estado</div><div>Descuento</div></div>
      ${rows.length===0
        ?`<div class="empty">${orders.length===0?"Sin órdenes registradas aún":"Sin resultados"}</div>`
        :rows.map(o=>{
          const b=o.buyer||{},z=ZONES[o.zone]||{},ok=o.status==="paid"||o.status==="approved";
          return`<div class="trow${ok?"":" pending"}">
            <div class="td"><span class="oid">${o.id}</span></div>
            <div class="td"><div class="bn">${b.name||"—"}</div><div class="bs">${b.email||"—"}</div><div class="bs">${b.phone||"—"}</div></div>
            <div class="td">${SHOWS[o.show]||o.show||"—"}</div>
            <div class="td"><span class="zb" style="color:${z.color||"#fff"};border-color:${z.color||"#fff"}44">${z.label||o.zone||"—"}</span></div>
            <div class="td qty">${o.qty||1}</div>
            <div class="td amt">$${(o.total||0).toLocaleString()}</div>
            <div class="td"><span class="st-b ${ok?"paid":"pend"}">${ok?"✓ Pagado":"⏳ Pendiente"}</span></div>
            <div class="td">${o.discount?`<span class="disc">${o.discount.code} −${o.discount.pct}%</span>`:'<span class="none">—</span>'}</div>
          </div>`;
        }).join("")}
    </div>
  </div>
  <div class="tfooter">${rows.length} de ${orders.length} órdenes · ${m.paid} pagadas · ${m.pending} pendientes</div>`;
}

function bindEvents(){
document.getElementById(“f-search”) ?.addEventListener(“input”,  e=>{filter.search=e.target.value;render();});
document.getElementById(“f-show”)   ?.addEventListener(“change”, e=>{filter.show=e.target.value;render();});
document.getElementById(“f-zone”)   ?.addEventListener(“change”, e=>{filter.zone=e.target.value;render();});
document.getElementById(“f-status”) ?.addEventListener(“change”, e=>{filter.status=e.target.value;render();});
}

window._reload=()=>{orders=[];inventory={};loadData();};
window._export=exportCSV;
loadData();
</script>

</head>
