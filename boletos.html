<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tributo K-pop Demon Hunters · Boletos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Firebase compat (sin type=module, funciona en Safari iOS) -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAbLNTVJ1pAxpPg2x7y3kGNFh0dzjDe2sU",
  authDomain: "tributo-kpop-demon-hunters.firebaseapp.com",
  projectId: "tributo-kpop-demon-hunters",
  storageBucket: "tributo-kpop-demon-hunters.firebasestorage.app",
  messagingSenderId: "964475171923",
  appId: "1:964475171923:web:0ce2d4f3e720709f0002a6"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var MP_LINK = "https://link.mercadopago.com.mx/demontickets";

var DISCOUNT_CODES = [
  { code: "KPOP2025", pct: 20, label: "20% de descuento" }
];

var SHOWS = [
  { id:"apr30-17", date:"Jue 30 Abr", time:"17:00 hrs", label:"Funcion 1 · Dia del Nino",  tag:"SOLD OUT", tagColor:"#FF2D78", soldOut:true  },
  { id:"apr30-18", date:"Jue 30 Abr", time:"18:45 hrs", label:"Funcion 2 · Dia del Nino",  tag:"SOLD OUT", tagColor:"#FF2D78", soldOut:true  },
  { id:"may02-17", date:"Sab 2 May",  time:"17:00 hrs", label:"Funcion 3 · Fin de semana", tag:"FAMILIAR", tagColor:"#FFE600", soldOut:false },
  { id:"may02-18", date:"Sab 2 May",  time:"18:45 hrs", label:"Funcion 4 · Fin de semana", tag:"FANS",     tagColor:"#FF2D78", soldOut:false }
];

var ZONES = [
  { id:"vip",  label:"VIP",        price:450, total:200, color:"#FFE600", desc:"Zona dorada · Frente al escenario" },
  { id:"pref", label:"Preferente", price:350, total:400, color:"#FF2D78", desc:"Vista privilegiada · Planta baja"  },
  { id:"seg",  label:"2do Piso",   price:250, total:400, color:"#00F5FF", desc:"Vista panoramica · Segundo nivel"  }
];

var state = {
  step:1, show:null, zone:null, qty:1,
  discount:null, discountInput:"", discountMsg:"",
  soldData:null, form:{name:"",email:"",phone:""},
  loading:false, loadingDB:true, error:"", ticket:null
};

function loadSoldData() {
  db.collection("kpop_show").doc("inventory").get().then(function(snap) {
    if (snap.exists) {
      state.soldData = snap.data();
    } else {
      state.soldData = {};
      SHOWS.forEach(function(s) {
        state.soldData[s.id] = {};
        ZONES.forEach(function(z) { state.soldData[s.id][z.id] = 0; });
      });
      db.collection("kpop_show").doc("inventory").set(state.soldData);
    }
    state.loadingDB = false;
    render();
  }).catch(function(e) {
    state.soldData = {};
    SHOWS.forEach(function(s) {
      state.soldData[s.id] = {};
      ZONES.forEach(function(z) { state.soldData[s.id][z.id] = 0; });
    });
    state.loadingDB = false;
    render();
  });
}

function avail(showId, zoneId) {
  if (!state.soldData) return 0;
  var zone = ZONES.find(function(z) { return z.id === zoneId; });
  return zone.total - ((state.soldData[showId] && state.soldData[showId][zoneId]) || 0);
}

function baseTotal() {
  if (!state.zone) return 0;
  return ZONES.find(function(z) { return z.id === state.zone; }).price * state.qty;
}
function discountAmt() {
  if (!state.discount) return 0;
  return Math.round(baseTotal() * state.discount.pct / 100);
}
function finalTotal() { return baseTotal() - discountAmt(); }

function render() {
  var appEl = document.getElementById("app");
  if (!appEl) return;

  if (state.loadingDB) {
    appEl.innerHTML = '<div style="text-align:center;padding:60px 20px"><div class="spinner" style="width:36px;height:36px;border-width:3px;margin:0 auto 16px"></div><div style="font-family:monospace;font-size:12px;letter-spacing:3px;color:var(--muted)">CARGANDO...</div></div>';
    return;
  }

  if (state.step === "pay_instructions") { appEl.innerHTML = renderPayInstructions(); return; }
  if (state.step === 4 && state.ticket)  { appEl.innerHTML = renderTicket(); generateQR(); return; }

  var html = '<div class="steps-nav">';
  html += '<div class="snav-item' + (state.step>=1?' active':'') + '"></div>';
  html += '<div class="snav-item' + (state.step>=2?' active':'') + '"></div>';
  html += '<div class="snav-item' + (state.step>=3?' active':'') + '"></div>';
  html += '</div>';

  // PASO 1
  html += '<div class="step-block"><div class="step-header"><span class="step-num">01</span><span class="step-title">Elige tu funcion</span></div>';
  html += '<div class="show-grid">';
  SHOWS.forEach(function(s) {
    html += '<div class="show-card' + (s.soldOut?' sold-out':'') + (state.show===s.id?' active':'') + '" onclick="selectShow(\'' + s.id + '\')">';
    html += '<div class="show-tag" style="color:' + s.tagColor + '">' + s.tag + '</div>';
    html += '<div class="show-date">' + s.date + '</div>';
    html += '<div class="show-time"' + (s.soldOut?' style="color:var(--muted);text-shadow:none"':'') + '>' + s.time + '</div>';
    html += '<div class="show-label">' + s.label + '</div>';
    if (s.soldOut) html += '<div class="sold-out-badge">AGOTADO</div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div class="soldout-note">Las funciones del 30 de abril estan agotadas. Quedan lugares para el 2 de mayo!</div>';
  html += '</div>';

  // PASO 2
  if (state.step >= 2) {
    html += '<div class="divider"></div><div class="step-block"><div class="step-header"><span class="step-num">02</span><span class="step-title">Elige zona</span></div>';
    html += '<div class="zone-grid">';
    ZONES.forEach(function(z) {
      var av = avail(state.show, z.id);
      var pct = Math.round(((z.total - av) / z.total) * 100);
      var active = state.zone === z.id;
      html += '<div class="zone-card' + (av<=0?' unavailable':'') + (active?' active':'') + '"';
      if (active) html += ' style="border-color:' + z.color + ';background:rgba(0,0,0,.25);box-shadow:0 0 22px rgba(0,0,0,.3)"';
      if (av > 0) html += ' onclick="selectZone(\'' + z.id + '\')"';
      html += '>';
      html += '<div class="zone-name" style="color:' + z.color + '">' + z.label + '</div>';
      html += '<div class="zone-price">$' + z.price + '</div>';
      html += '<div class="zone-desc">' + z.desc + '</div>';
      html += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;background:' + z.color + '"></div></div>';
      html += '<div class="zone-avail" style="color:' + z.color + '">' + (av>0 ? av+' disponibles' : 'Agotado') + '</div>';
      html += '</div>';
    });
    html += '</div>';

    if (state.zone) {
      var maxQ = Math.min(8, avail(state.show, state.zone));
      html += '<div class="qty-row">';
      html += '<button class="qty-btn" onclick="changeQty(-1)"' + (state.qty<=1?' disabled':'') + '>-</button>';
      html += '<div class="qty-num">' + state.qty + '</div>';
      html += '<button class="qty-btn" onclick="changeQty(1)"' + (state.qty>=maxQ?' disabled':'') + '>+</button>';
      html += '</div><div class="qty-hint">Maximo 8 boletos por compra</div>';
      html += renderSummaryBar();
    }
    html += '</div>';
  }

  // PASO 3
  if (state.step >= 3) {
    html += '<div class="divider"></div><div class="step-block"><div class="step-header"><span class="step-num">03</span><span class="step-title">Tus datos</span></div>';
    html += '<div class="form-grid">';
    html += '<div class="form-full"><label>Nombre completo *</label><input type="text" placeholder="Tu nombre completo" value="' + state.form.name + '" oninput="setField(\'name\',this.value)"></div>';
    html += '<div><label>Correo electronico *</label><input type="email" placeholder="correo@ejemplo.com" value="' + state.form.email + '" oninput="setField(\'email\',this.value)"></div>';
    html += '<div><label>Telefono *</label><input type="tel" placeholder="55 1234 5678" value="' + state.form.phone + '" oninput="setField(\'phone\',this.value)"></div>';
    html += '</div><div class="divider" style="margin:20px 0"></div>';

    html += '<div class="discount-row"><div class="discount-label">Tienes un codigo de descuento?</div>';
    html += '<div class="discount-input-wrap">';
    html += '<input type="text" class="discount-input" placeholder="INGRESA TU CODIGO" value="' + state.discountInput + '" oninput="setDiscountInput(this.value)" style="text-transform:uppercase;letter-spacing:2px">';
    html += '<button class="discount-btn" onclick="applyDiscount()">APLICAR</button>';
    html += '</div>';
    if (state.discountMsg) html += '<div class="discount-msg ' + (state.discount?'ok':'err') + '">' + state.discountMsg + '</div>';
    if (state.discount) {
      html += '<div class="discount-applied"><span>' + state.discount.label + '</span>';
      html += '<span style="color:var(--yellow);font-weight:700">-' + state.discount.pct + '% (-$' + discountAmt().toLocaleString() + ')</span>';
      html += '<button onclick="removeDiscount()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;margin-left:auto">x</button></div>';
    }
    html += '</div>';

    html += renderFinalSummary();
    if (state.error) html += '<div class="alert-error">' + state.error + '</div>';

    var disabled = state.loading || !state.form.name || !state.form.email || !state.form.phone;
    html += '<button class="btn-primary" onclick="handlePay()"' + (disabled?' disabled':'') + '>';
    html += state.loading ? '<span class="spinner"></span>PROCESANDO...' : 'PAGAR $' + finalTotal().toLocaleString() + ' MXN - MERCADOPAGO';
    html += '</button>';
    html += '<div class="mp-badge">PAGO SEGURO - TU BOLETO QR LLEGA AL INSTANTE</div>';
    html += '</div>';
  }

  appEl.innerHTML = html;
}

function renderSummaryBar() {
  var show = SHOWS.find(function(s) { return s.id === state.show; });
  var zone = ZONES.find(function(z) { return z.id === state.zone; });
  return '<div class="summary-bar"><div class="summary-info">' + show.date + ' - ' + show.time + '<br><strong>' + zone.label + '</strong> x ' + state.qty + ' boleto' + (state.qty>1?'s':'') + '</div><div class="summary-total">$' + baseTotal().toLocaleString() + '</div></div>';
}

function renderFinalSummary() {
  if (!state.zone) return "";
  var zone = ZONES.find(function(z) { return z.id === state.zone; });
  var html = '<div class="final-summary">';
  html += '<div class="fs-row"><span>Zona ' + zone.label + ' x ' + state.qty + '</span><span>$' + baseTotal().toLocaleString() + '</span></div>';
  if (state.discount) html += '<div class="fs-row discount"><span>Descuento ' + state.discount.code + ' (' + state.discount.pct + '%)</span><span>-$' + discountAmt().toLocaleString() + '</span></div>';
  html += '<div class="fs-divider"></div>';
  html += '<div class="fs-row total"><span>TOTAL</span><span style="color:var(--cyan)">$' + finalTotal().toLocaleString() + ' MXN</span></div>';
  html += '</div>';
  return html;
}

function renderPayInstructions() {
  var zone = ZONES.find(function(z) { return z.id === state.zone; });
  var total = finalTotal();
  return '<div class="ticket-wrap" style="text-align:center">' +
    '<div style="font-size:36px;margin-bottom:10px">Pago</div>' +
    '<div class="ticket-title">INSTRUCCIONES DE PAGO</div>' +
    '<div class="ticket-sub">Sigue estos pasos para completar tu compra</div>' +
    '<div style="background:rgba(255,230,0,.08);border:2px solid var(--yellow);border-radius:12px;padding:20px;margin:20px 0">' +
    '<div style="font-family:monospace;font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:8px">MONTO EXACTO A PAGAR</div>' +
    '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:52px;color:var(--yellow);letter-spacing:2px">$' + total.toLocaleString() + '</div>' +
    '<div style="font-family:monospace;font-size:11px;color:var(--muted);margin-top:4px">MXN - ' + zone.label + ' x ' + state.qty + ' boleto' + (state.qty>1?'s':'') + '</div>' +
    '</div>' +
    '<div style="background:rgba(0,0,0,.3);border-radius:10px;padding:16px;text-align:left;margin-bottom:20px;font-size:13px;color:var(--text);line-height:2">' +
    '<strong style="color:#fff">1.</strong> Toca el boton IR A MERCADOPAGO<br>' +
    '<strong style="color:#fff">2.</strong> Ingresa el monto exacto: <strong style="color:var(--yellow)">$' + total.toLocaleString() + '</strong><br>' +
    '<strong style="color:#fff">3.</strong> Completa el pago y regresa para recibir tu boleto QR' +
    '</div>' +
    '<button class="btn-primary" onclick="goToMP()">IR A MERCADOPAGO - $' + total.toLocaleString() + ' MXN</button>' +
    '<button class="btn-secondary" onclick="resetApp()">REGRESAR</button>' +
    '</div>';
}

function renderTicket() {
  var t = state.ticket;
  return '<div class="ticket-wrap">' +
    '<div style="font-size:36px;margin-bottom:10px">Listo!</div>' +
    '<div class="ticket-title">Compra exitosa!</div>' +
    '<div class="ticket-sub">Presenta este QR en la entrada del teatro</div>' +
    '<div id="qr-canvas" style="width:200px;height:200px;margin:0 auto 24px"></div>' +
    '<div class="ticket-detail">' +
    '<div><div class="tk-key">Evento</div><div class="tk-val">Demon Hunters K-Pop</div></div>' +
    '<div><div class="tk-key">Fecha</div><div class="tk-val">' + t.show.date + '</div></div>' +
    '<div><div class="tk-key">Hora</div><div class="tk-val">' + t.show.time + '</div></div>' +
    '<div><div class="tk-key">Zona</div><div class="tk-val" style="color:' + t.zone.color + '">' + t.zone.label + '</div></div>' +
    '<div><div class="tk-key">Boletos</div><div class="tk-val">' + t.qty + '</div></div>' +
    '<div><div class="tk-key">Total</div><div class="tk-val" style="color:var(--cyan)">$' + t.total.toLocaleString() + ' MXN</div></div>' +
    '<div class="tk-full"><div class="tk-key">Comprador</div><div class="tk-val">' + t.buyer.name + '</div></div>' +
    '<div class="tk-full"><div class="tk-key">Correo</div><div class="tk-val">' + t.buyer.email + '</div></div>' +
    '</div>' +
    '<div class="ticket-id">ID: ' + t.id + '</div>' +
    '<div class="alert-info" style="margin:16px 0">Toma una captura de pantalla como respaldo</div>' +
    '<button class="btn-secondary" onclick="resetApp()">COMPRAR OTRO BOLETO</button>' +
    '</div>';
}

function selectShow(id) {
  var show = SHOWS.find(function(s) { return s.id === id; });
  if (show.soldOut) return;
  state.show = id; state.zone = null; state.qty = 1;
  if (state.step < 2) state.step = 2;
  render();
}

function selectZone(id) {
  state.zone = id; state.qty = 1;
  if (state.step < 3) state.step = 3;
  render();
}

function changeQty(d) {
  var max = Math.min(8, avail(state.show, state.zone));
  state.qty = Math.max(1, Math.min(max, state.qty + d));
  render();
}

function setField(k, v) { state.form[k] = v; }

function setDiscountInput(v) { state.discountInput = v.toUpperCase(); }

function applyDiscount() {
  var code = state.discountInput.trim().toUpperCase();
  var found = DISCOUNT_CODES.find(function(d) { return d.code === code; });
  if (found) {
    state.discount = found;
    state.discountMsg = "Codigo valido: " + found.label;
  } else {
    state.discount = null;
    state.discountMsg = "Codigo no valido. Verifica e intenta de nuevo.";
  }
  render();
}

function removeDiscount() { state.discount = null; state.discountMsg = ""; state.discountInput = ""; render(); }

function handlePay() {
  if (!state.form.name || !state.form.email || !state.form.phone) {
    state.error = "Por favor completa todos los campos."; render(); return;
  }
  state.error = ""; state.loading = true; render();
  var orderId = "KP-" + Math.random().toString(36).slice(2,8).toUpperCase();
  var zone = ZONES.find(function(z) { return z.id === state.zone; });

  db.collection("kpop_show").doc("orders").collection("items").doc(orderId).set({
    id: orderId, show: state.show, zone: state.zone, qty: state.qty,
    unitPrice: zone.price, discount: state.discount || null,
    total: finalTotal(), buyer: state.form, status: "pending",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function(e) { console.warn("Firebase error:", e); }).finally(function() {
    sessionStorage.setItem("kpop_order", JSON.stringify({
      id: orderId, show: state.show, zone: state.zone,
      qty: state.qty, form: state.form, discount: state.discount, total: finalTotal()
    }));
    state.loading = false;
    state.step = "pay_instructions";
    render();
  });
}

function goToMP() { window.location.href = MP_LINK; }

function resetApp() {
  state = { step:1, show:null, zone:null, qty:1, discount:null, discountInput:"",
    discountMsg:"", soldData:state.soldData, form:{name:"",email:"",phone:""},
    loading:false, loadingDB:false, error:"", ticket:null };
  render();
}

function generateQR() {
  var t = state.ticket;
  var data = "DEMONHUNTERS|" + t.id + "|" + t.show.id + "|" + t.zone.id + "|" + t.qty + "|" + t.buyer.email;
  new QRCode(document.getElementById("qr-canvas"), {
    text: data, width:200, height:200,
    colorDark:"#FF2D78", colorLight:"#0D0025",
    correctLevel: QRCode.CorrectLevel.M
  });
}

function checkReturnFromMP() {
  var params = new URLSearchParams(window.location.search);
  var paymentStatus = params.get("status") || params.get("collection_status");
  var pending = sessionStorage.getItem("kpop_order");
  if (paymentStatus === "approved" && pending) {
    var order = JSON.parse(pending);
    sessionStorage.removeItem("kpop_order");
    db.collection("kpop_show").doc("orders").collection("items").doc(order.id).update({
      status: "paid", paidAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(e) { console.error(e); });
    var show = SHOWS.find(function(s) { return s.id === order.show; });
    var zone = ZONES.find(function(z) { return z.id === order.zone; });
    state.ticket = { id:order.id, show:show, zone:zone, qty:order.qty,
      discount:order.discount, total:order.total, buyer:order.form };
    state.step = 4;
    state.loadingDB = false;
    render();
    return true;
  }
  return false;
}

// Exponer funciones globales
window.selectShow      = selectShow;
window.selectZone      = selectZone;
window.changeQty       = changeQty;
window.setField        = setField;
window.setDiscountInput = setDiscountInput;
window.applyDiscount   = applyDiscount;
window.removeDiscount  = removeDiscount;
window.handlePay       = handlePay;
window.goToMP          = goToMP;
window.resetApp        = resetApp;

render();
var returned = checkReturnFromMP();
if (!returned) loadSoldData();
</script>

</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="eyebrow">Venta Oficial de Boletos</div>
    <h1>TRIBUTO<br><span>K-POP</span></h1>
    <div class="hero-demon">DEMON HUNTERS</div>
    <div class="hero-sub">Dia del Nino · 30 Abr &amp; 2 May · 2026</div>
  </div>
  <div id="app"></div>
</div>
<style>
:root{--pink:#FF2D78;--cyan:#00F5FF;--yellow:#FFE600;--deep:#08001A;--dark:#0D0025;--card:#110028;--muted:#8B7AAA;--text:#F0E6FF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 50% at 20% 0%,rgba(255,45,120,.13) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(0,245,255,.08) 0%,transparent 60%);}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 18px 80px;}
.hero{text-align:center;padding:44px 0 32px;border-bottom:1px solid rgba(255,45,120,.15);margin-bottom:32px;}
.eyebrow{display:inline-block;background:var(--pink);color:#fff;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:4px 14px;border-radius:2px;margin-bottom:18px;box-shadow:0 0 20px rgba(255,45,120,.5);animation:glow 2.5s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 12px rgba(255,45,120,.5)}50%{box-shadow:0 0 28px rgba(255,45,120,.9)}}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,13vw,96px);letter-spacing:6px;line-height:1;color:#fff;text-shadow:0 0 40px rgba(255,45,120,.5);margin-bottom:0;}
h1 span{color:var(--cyan);text-shadow:0 0 30px rgba(0,245,255,.7);}
.hero-demon{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,6vw,44px);letter-spacing:10px;color:var(--yellow);text-shadow:0 0 20px rgba(255,230,0,.6);margin-top:4px;margin-bottom:10px;}
.hero-sub{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;}
.steps-nav{display:flex;gap:6px;margin-bottom:28px;}
.snav-item{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.08);transition:background .3s;}
.snav-item.active{background:linear-gradient(90deg,var(--pink),var(--cyan));}
.step-block{margin-bottom:32px;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.step-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.step-num{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--pink);background:rgba(255,45,120,.1);border:1px solid var(--pink);padding:2px 10px;border-radius:2px;}
.step-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:#fff;}
.show-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(max-width:460px){.show-grid{grid-template-columns:1fr;}}
.show-card{background:var(--card);border:2px solid rgba(255,45,120,.18);border-radius:10px;padding:18px 14px;cursor:pointer;transition:all .2s;text-align:center;position:relative;}
.show-card:hover:not(.sold-out),.show-card.active{border-color:var(--pink);background:rgba(255,45,120,.12);box-shadow:0 0 20px rgba(255,45,120,.25);}
.show-card.sold-out{opacity:.55;cursor:not-allowed;border-color:rgba(255,255,255,.08);}
.show-tag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.show-date{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;}
.show-time{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--pink);letter-spacing:1px;text-shadow:0 0 15px rgba(255,45,120,.5);}
.show-label{font-size:11px;color:var(--muted);margin-top:4px;}
.sold-out-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-15deg);background:rgba(255,45,120,.9);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;padding:4px 14px;border-radius:4px;box-shadow:0 0 20px rgba(255,45,120,.5);}
.soldout-note{text-align:center;margin-top:12px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--cyan);padding:8px;background:rgba(0,245,255,.05);border:1px solid rgba(0,245,255,.15);border-radius:6px;}
.zone-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:400px){.zone-grid{grid-template-columns:1fr;}}
.zone-card{background:var(--card);border:2px solid rgba(255,255,255,.07);border-radius:10px;padding:16px 12px;cursor:pointer;transition:all .2s;text-align:center;}
.zone-card.unavailable{opacity:.35;cursor:not-allowed;}
.zone-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;}
.zone-price{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;letter-spacing:1px;}
.zone-desc{font-size:10px;color:var(--muted);margin-top:3px;}
.progress-bar{height:3px;border-radius:2px;margin-top:8px;background:rgba(255,255,255,.06);overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .5s;}
.zone-avail{font-family:'Space Mono',monospace;font-size:10px;margin-top:5px;}
.qty-row{display:flex;align-items:center;justify-content:center;gap:20px;margin:16px 0 8px;}
.qty-btn{width:42px;height:42px;border-radius:8px;border:1px solid var(--pink);background:rgba(255,45,120,.12);color:var(--pink);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.qty-btn:disabled{border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#444;cursor:not-allowed;}
.qty-num{font-family:'Bebas Neue',sans-serif;font-size:40px;color:#fff;min-width:44px;text-align:center;letter-spacing:2px;}
.qty-hint{text-align:center;font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
.summary-bar{background:rgba(18,0,48,.9);border:1px solid rgba(255,45,120,.25);border-radius:10px;padding:14px 18px;margin-top:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.summary-info{font-size:13px;color:var(--muted);line-height:1.8;}
.summary-info strong{color:#fff;}
.summary-total{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--cyan);letter-spacing:2px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.form-grid{grid-template-columns:1fr;}}
.form-full{grid-column:1/-1;}
label{display:block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
input{width:100%;background:rgba(18,0,48,.9);border:1px solid rgba(255,45,120,.22);border-radius:7px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
input:focus{border-color:var(--pink);box-shadow:0 0 12px rgba(255,45,120,.2);}
input::placeholder{color:rgba(139,122,170,.5);}
.discount-row{background:rgba(18,0,48,.7);border:1px solid rgba(255,230,0,.15);border-radius:10px;padding:16px;margin-bottom:16px;}
.discount-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.discount-input-wrap{display:flex;gap:8px;}
.discount-input{flex:1;background:rgba(0,0,0,.3);border:1px solid rgba(255,230,0,.2);border-radius:7px;padding:10px 14px;color:var(--yellow);font-family:'Space Mono',monospace;font-size:13px;letter-spacing:2px;}
.discount-btn{background:rgba(255,230,0,.12);border:1px solid var(--yellow);color:var(--yellow);border-radius:7px;padding:10px 18px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;white-space:nowrap;}
.discount-msg{font-size:12px;margin-top:8px;font-family:'Space Mono',monospace;letter-spacing:1px;}
.discount-msg.ok{color:#4ade80;}
.discount-msg.err{color:var(--pink);}
.discount-applied{display:flex;align-items:center;gap:10px;margin-top:10px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.3);border-radius:6px;padding:8px 12px;font-size:12px;color:#4ade80;font-family:'Space Mono',monospace;}
.final-summary{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 18px;margin-bottom:4px;}
.fs-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:4px 0;}
.fs-row.discount{color:#4ade80;}
.fs-row.total{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;padding-top:8px;}
.fs-divider{height:1px;background:rgba(255,255,255,.08);margin:8px 0;}
.btn-primary{width:100%;padding:15px;border:none;border-radius:10px;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:#fff;background:linear-gradient(90deg,#FF2D78,#FF6B9D);box-shadow:0 0 30px rgba(255,45,120,.4);transition:all .2s;margin-top:14px;}
.btn-primary:disabled{background:rgba(255,255,255,.06);box-shadow:none;color:#555;cursor:not-allowed;}
.btn-secondary{width:100%;padding:13px;border:1px solid rgba(255,45,120,.3);border-radius:10px;background:transparent;color:var(--pink);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;margin-top:12px;}
.alert-error{background:rgba(255,45,120,.1);border:1px solid var(--pink);border-radius:8px;padding:11px 16px;font-size:13px;color:var(--pink);margin-top:12px;text-align:center;}
.alert-info{background:rgba(0,245,255,.07);border:1px solid rgba(0,245,255,.3);border-radius:8px;padding:11px 16px;font-size:11px;color:var(--cyan);text-align:center;font-family:'Space Mono',monospace;letter-spacing:1px;}
.ticket-wrap{background:linear-gradient(135deg,rgba(255,45,120,.1),rgba(0,245,255,.05));border:1px solid rgba(0,245,255,.3);border-radius:16px;padding:36px 28px;text-align:center;}
.ticket-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px;color:#fff;margin-bottom:4px;}
.ticket-sub{font-size:12px;color:var(--muted);margin-bottom:28px;}
.ticket-detail{background:rgba(0,0,0,.3);border-radius:8px;padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;text-align:left;margin-bottom:20px;}
.tk-key{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
.tk-val{font-size:14px;color:#fff;font-weight:700;}
.tk-full{grid-column:1/-1;}
.ticket-id{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,45,120,.3),transparent);margin:24px 0;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.mp-badge{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;opacity:.5;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);}
</style>
</body>
</html>
